<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Life Archive Cloud Fixed</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/201/201623.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/select/1.6.2/css/select.bootstrap5.min.css">
    <style>
        :root { --main-blue: #2193b0; --main-gradient: linear-gradient(135deg, #74ebd5, #9face6); }
        body { background-color: #fdfdfd; font-family: sans-serif; padding-bottom: 50px; }
        .main-header { background: var(--main-gradient); color: white; padding: 1.5rem 0; }
        .nav-genre .nav-link { color: #555; border: 1px solid #eee; margin: 0 5px; border-radius: 30px; font-weight: bold; }
        .nav-genre .nav-link.active { background: var(--main-blue) !important; color: white !important; }
        .sync-status { font-size: 0.8rem; padding: 5px 15px; border-radius: 20px; font-weight: bold; background: #e8f5e9; color: #2e7d32; }
        #dropZone { border: 3px dashed #cbd5e1; border-radius: 20px; padding: 40px; text-align: center; cursor: pointer; background: #f8fafc; }
    </style>
</head>
<body>

<script>
    const GITHUB_CONFIG = {
        owner: 'takuminandesu-nandesuka',
        repo: 'Family-Memory-Archive',
        path: 'data.json'
    };
    let userToken = sessionStorage.getItem('github_token') || "";
</script>

<header class="main-header text-center">
    <h2 class="fw-bold m-0">🏠 Family Life Archive</h2>
    <div id="cloudStatus" class="sync-status d-inline-block mt-2">✅ クラウド接続中</div>
</header>

<div class="genre-tabs py-2 shadow-sm bg-white sticky-top">
    <div class="container d-flex justify-content-center">
        <ul class="nav nav-genre">
            <li class="nav-item"><button class="nav-link active" onclick="switchGenre('旅行')">✈️ 旅行</button></li>
            <li class="nav-item"><button class="nav-link" onclick="switchGenre('エンタメ')">🎬 エンタメ</button></li>
            <li class="nav-item"><button class="nav-link" onclick="switchGenre('家電')">🔌 家電</button></li>
            <li class="nav-item"><button class="nav-link" onclick="switchGenre('冠婚葬祭')">👔 冠婚葬祭</button></li>
            <li class="nav-item"><button class="nav-link" onclick="switchGenre('通院')">🏥 通院</button></li>
        </ul>
    </div>
</div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 id="currentGenreTitle" class="fw-bold m-0">✈️ 旅行</h4>
        <div class="d-flex gap-2">
            <button id="bulkDeleteBtn" class="btn btn-outline-danger btn-sm rounded-pill d-none" onclick="bulkDelete()">🗑 選択削除</button>
            <button class="btn btn-outline-success btn-sm rounded-pill" onclick="openImportModal()">📥 CSV取り込み</button>
            <button class="btn btn-primary rounded-pill px-4 fw-bold" onclick="openModal(-1)">＋ 新規登録</button>
        </div>
    </div>
    <div class="card border-0 shadow-sm"><div class="p-3"><table id="mainTable" class="table table-hover w-100"><thead id="mainTableHead"></thead><tbody></tbody></table></div></div>
</div>

<div class="modal fade" id="importModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0 shadow-lg" style="border-radius: 20px;"><div class="modal-header"><h5 class="fw-bold">📥 CSV取り込み（現在のタブ用）</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div id="dropZone" onclick="$('#csvFileInput').click()"><p>CSVをドロップまたはクリック</p><input type="file" id="csvFileInput" class="d-none" accept=".csv" onchange="handleFileSelect(event)"></div><p class="small text-muted mt-2">※現在のタブ（<span id="targetGenreLabel"></span>）にデータが追加されます。</p></div></div></div></div>

<div class="modal fade" id="editModal" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content border-0 shadow-lg" style="border-radius: 20px;"><div class="modal-header"><h5 class="fw-bold">記録を編集</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body" id="modalFieldsArea"></div><div class="modal-footer border-0"><button class="btn btn-link text-danger me-auto" onclick="deleteRecord()">削除</button><button id="saveBtn" class="btn btn-primary px-5 rounded-pill shadow fw-bold" onclick="saveRecord()">保存</button></div></div></div></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/select/1.6.2/js/dataTables.select.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const genreConfigs = {
        "旅行": { fields: ["年", "旅行日", "タイプ", "行先", "ホテル/旅館", "回った場所"], keys: ["year", "date", "type", "title", "place", "memo"] },
        "エンタメ": { fields: ["年", "日付", "ジャンル", "会場", "作品名", "備考"], keys: ["year", "date", "genre", "venue", "title", "memo"] },
        "家電": { fields: ["年", "購入日", "家電", "保証期間", "備考1", "備考2"], keys: ["year", "date", "item", "warranty", "note1", "note2"] },
        "冠婚葬祭": { fields: ["年", "日付", "種別", "名前", "金額", "備考"], keys: ["year", "date", "type", "name", "amount", "note"] },
        "通院": { fields: ["年", "通院日", "病院", "名前", "内容", "-"], keys: ["year", "date", "hospital", "name", "note", "memo"] }
    };

    let allData = { "旅行":[], "エンタメ":[], "家電":[], "冠婚葬祭":[], "通院":[] };
    let currentGenre = "旅行";
    let editingIdx = -1;
    let currentSha = "";
    let table;

    $(document).ready(() => { loadFromGitHub(); setupDragAndDrop(); });

    async function loadFromGitHub() {
        const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error();
            const data = await res.json();
            currentSha = data.sha;
            allData = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            switchGenre(currentGenre);
        } catch (e) { alert("データ読み込みエラー。GitHubの設定を確認してください。"); }
    }

    async function saveToGitHub() {
        if (!userToken) {
            userToken = prompt("GitHubトークンを入力：");
            if (!userToken) return;
            sessionStorage.setItem('github_token', userToken);
        }
        const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`;
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(allData, null, 2))));
        try {
            const res = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${userToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Update", content: content, sha: currentSha })
            });
            if (res.ok) location.reload();
            else alert('保存に失敗しました。トークンの権限を確認してください。');
        } catch (e) { alert('通信エラーが発生しました。'); }
    }

    function switchGenre(genre) {
        currentGenre = genre;
        $('.nav-link').removeClass('active');
        $(`.nav-link:contains("${genre}")`).addClass('active');
        $('#currentGenreTitle').text(genre);
        initTable();
    }

    function initTable() {
        const config = genreConfigs[currentGenre];
        const tableData = (allData[currentGenre] || []).map((d, i) => ({ ...d, idx: i }));
        
        let headHtml = '<tr><th><input type="checkbox" id="selectAll"></th>' + config.fields.map(f => `<th>${f}</th>`).join('') + '</tr>';
        $('#mainTableHead').html(headHtml);

        if ($.fn.DataTable.isDataTable('#mainTable')) table.destroy();
        table = $('#mainTable').DataTable({
            data: tableData,
            columns: [{ data: null, defaultContent: '<input type="checkbox" class="row-check">', orderable: false }, ...config.keys.map(k => ({ data: k }))],
            select: { style: 'multi', selector: 'td:first-child' },
            language: { url: "https://cdn.datatables.net/plug-ins/1.13.4/i18n/ja.json" }
        });

        $('#selectAll').on('click', function() {
            const isChecked = this.checked;
            $('.row-check').prop('checked', isChecked);
            if(isChecked) table.rows().select(); else table.rows().deselect();
            toggleDeleteBtn();
        });

        $('#mainTable tbody').on('click', 'td:not(:first-child)', function() {
            openModal(table.row(this).data().idx);
        });
        
        $('#mainTable tbody').on('change', '.row-check', function() {
            const row = table.row($(this).closest('tr'));
            if(this.checked) row.select(); else row.deselect();
            toggleDeleteBtn();
        });
    }

    function toggleDeleteBtn() {
        const count = $('.row-check:checked').length;
        if(count > 0) $('#bulkDeleteBtn').removeClass('d-none').text(`🗑 ${count}件を削除`);
        else $('#bulkDeleteBtn').addClass('d-none');
    }

    function bulkDelete() {
        if(!confirm('選択した項目を削除しますか？')) return;
        const selectedIndices = [];
        $('.row-check:checked').each(function() {
            selectedIndices.push(table.row($(this).closest('tr')).data().idx);
        });
        selectedIndices.sort((a, b) => b - a).forEach(idx => allData[currentGenre].splice(idx, 1));
        saveToGitHub();
    }

    function openModal(idx) {
        editingIdx = idx;
        const config = genreConfigs[currentGenre];
        let html = '<div class="row g-3">';
        config.fields.forEach((f, i) => {
            if(config.keys[i] === "-") return;
            const val = idx === -1 ? '' : allData[currentGenre][idx][config.keys[i]];
            html += `<div class="col-md-6"><label class="small fw-bold">${f}</label><input type="text" id="f-${config.keys[i]}" class="form-control" value="${val||''}"></div>`;
        });
        $('#modalFieldsArea').html(html + '</div>');
        new bootstrap.Modal('#editModal').show();
    }

    function saveRecord() {
        const config = genreConfigs[currentGenre];
        let d = {};
        config.keys.forEach(k => { if(k !== "-") d[k] = $(`#f-${k}`).val(); });
        if(editingIdx === -1) allData[currentGenre].push(d);
        else allData[currentGenre][editingIdx] = d;
        saveToGitHub();
    }

    function deleteRecord() { if(confirm('削除しますか？')) { allData[currentGenre].splice(editingIdx, 1); saveToGitHub(); } }

    function openImportModal() { $('#targetGenreLabel').text(currentGenre); new bootstrap.Modal('#importModal').show(); }

    function handleFileSelect(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const rows = ev.target.result.split(/\r?\n/).map(r => r.split(','));
            const config = genreConfigs[currentGenre];
            const newData = rows.slice(1).filter(r => r.length > 1).map(row => {
                let d = {};
                // CSVの並び順に基づいて、現在のジャンルのキーにマッピング
                config.keys.forEach((key, i) => {
                    if (key !== "-") d[key] = row[i] || '';
                });
                return d;
            });
            allData[currentGenre] = (allData[currentGenre] || []).concat(newData);
            saveToGitHub();
        };
        reader.readAsText(e.target.files[0], 'Shift-JIS');
    }

    function setupDragAndDrop() {
        $('#dropZone').on('dragover', (e) => e.preventDefault()).on('drop', (e) => {
            e.preventDefault(); handleFileSelect({target: {files: e.originalEvent.dataTransfer.files}});
        });
    }
</script>
</body>
</html>
